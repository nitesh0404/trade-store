name: CI

on:
  push:
  pull_request:

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -vv

      - name: OSS vulnerability scan (Safety)
        run: |
          set -euo pipefail
          safety check --json > safety-report.json

      - name: Fail on critical vulnerabilities
        run: |
          python scripts/check_critical_vulnerabilities.py safety-report.json

      - name: Regression tests placeholder
        run: |
          echo "ToDo: wire regression suite in a dedicated stage."
