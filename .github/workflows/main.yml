name: CI

on:
  push:
  pull_request:

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -vv

      - name: OSS vulnerability scan (Safety)
        run: |
          set -euo pipefail
          safety check --json > safety-report.json
          safety_exit=0
          safety check --json > safety-report.json || safety_exit=$?

          if [ "$safety_exit" -ne 0 ] && [ "$safety_exit" -ne 64 ]; then
            echo "Safety scan failed with unexpected exit code: $safety_exit"
            exit "$safety_exit"
          fi

          if [ "$safety_exit" -eq 64 ]; then
            echo "Safety found vulnerabilities (exit 64). Continuing to critical vulnerability gate."
          fi

      - name: Fail on critical vulnerabilities
        run: |
          python scripts/check_critical_vulnerabilities.py safety-report.json

      - name: Regression tests placeholder
        run: |
          echo "TODO: wire regression suite (contract/e2e/perf) in a dedicated stage."
